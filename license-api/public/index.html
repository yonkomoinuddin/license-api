<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>License Dashboard</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="login-screen" class="screen">
  <div class="login-box">
    <h1>License Dashboard</h1>
    <p class="muted">Paste your ADMIN_TOKEN to continue.</p>
    <input id="token-input" type="password" placeholder="Admin token" />
    <button id="login-btn">Log in</button>
    <p id="login-error" class="error"></p>
  </div>
</div>

<div id="app-screen" class="screen hidden">
  <header>
    <h1>License Dashboard</h1>
    <button id="logout-btn" class="secondary">Log out</button>
  </header>

  <section class="panel">
    <h2>Products</h2>
    <div class="row">
      <input id="new-product-name" placeholder="Product name (e.g. Advanced Garage)" />
      <button id="create-product-btn">Create product</button>
    </div>
    <table id="products-table">
      <thead><tr><th>Name</th><th>Product Key</th><th>Created</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="panel">
    <h2>Licenses</h2>
    <div class="row">
      <select id="license-product-select"></select>
      <input id="new-license-customer" placeholder="Customer name (optional)" />
      <input id="new-license-cidr" placeholder="Optional CIDR override e.g. 203.0.113.0/24" />
      <button id="create-license-btn">Create license</button>
    </div>
    <table id="licenses-table">
      <thead>
        <tr>
          <th>Product</th><th>Customer</th><th>License Key</th><th>Status</th>
          <th>Bound IP</th><th>Last Seen</th><th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="panel">
    <h2>Recent Activity <span id="logs-license-label" class="muted"></span></h2>
    <table id="logs-table">
      <thead><tr><th>Time</th><th>IP</th><th>Resource</th><th>Valid</th><th>Reason</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
</div>

<script src="app.js"></script>
</body>
</html>
